<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XSSniper — Forgot Password</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="auth-bg">
  <div class="auth-orb auth-orb-1"></div>
  <div class="auth-orb auth-orb-2"></div>
  <div class="auth-orb auth-orb-3"></div>
  <div style="position:absolute;inset:0;background-image:linear-gradient(var(--b) 1px,transparent 1px),linear-gradient(90deg,var(--b) 1px,transparent 1px);background-size:60px 60px;opacity:0.3;pointer-events:none;"></div>

  <div class="auth-card">
    <div class="auth-icon">🔑</div>
    <div class="auth-title">FORGOT PASSWORD</div>
    <div class="auth-subtitle">// ACCOUNT RECOVERY</div>

    <div id="fp-error"   class="error-msg"   style="display:none;"></div>
    <div id="fp-success" class="success-msg" style="display:none;background:rgba(0,255,136,0.08);border:1px solid rgba(0,255,136,0.3);border-radius:10px;padding:14px 16px;font-size:13px;color:var(--g);margin-bottom:16px;text-align:center;line-height:1.6;"></div>

    <div id="fp-form-wrap">
      <p style="text-align:center;font-size:13px;color:var(--td);margin-bottom:24px;line-height:1.6;">
        Enter the email address associated with your account.<br>
        We'll send you a link to reset your password.
      </p>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input id="fp-email" class="form-input" type="email"
               placeholder="you@email.com" autocomplete="email" required>
      </div>

      <button id="fp-btn" class="btn btn-primary btn-lg"
              style="width:100%;font-family:var(--font-hd);letter-spacing:3px;font-size:15px;margin-top:8px;"
              onclick="doForgotPassword()">
        SEND RESET LINK
      </button>
    </div>

    <p style="text-align:center;margin-top:20px;font-size:13px;color:var(--td);">
      Remember your password?
      <a href="/login" style="color:var(--g);text-decoration:none;margin-left:4px;font-weight:600;">Login →</a>
    </p>
  </div>
</div>

<script src="/static/js/app.js"></script>
<script>
async function doForgotPassword() {
  const email  = document.getElementById('fp-email').value.trim();
  const btn    = document.getElementById('fp-btn');
  const errEl  = document.getElementById('fp-error');
  const sucEl  = document.getElementById('fp-success');

  errEl.style.display = 'none';
  sucEl.style.display = 'none';

  if (!email) {
    errEl.textContent    = 'Please enter your email address.';
    errEl.style.display  = 'block';
    return;
  }

  btn.disabled     = true;
  btn.textContent  = 'SENDING...';

  try {
    const res  = await fetch('/api/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    const data = await res.json();

    if (!res.ok) {
      errEl.textContent   = data.detail || 'Something went wrong. Please try again.';
      errEl.style.display = 'block';
      btn.disabled        = false;
      btn.textContent     = 'SEND RESET LINK';
      return;
    }

    // Success — show message and hide the form
    document.getElementById('fp-form-wrap').style.display = 'none';
    sucEl.innerHTML     = `
      <div style="font-size:28px;margin-bottom:10px;">📧</div>
      <strong>Check your inbox!</strong><br><br>
      If <strong>${email}</strong> is registered, a password reset link has been sent.<br><br>
      <span style="color:var(--td);font-size:12px;">
        The link expires in 1 hour. Check your spam folder if you don't see it.
      </span>
    `;
    sucEl.style.display = 'block';

  } catch (err) {
    errEl.textContent   = 'Network error. Please try again.';
    errEl.style.display = 'block';
    btn.disabled        = false;
    btn.textContent     = 'SEND RESET LINK';
  }
}

// Allow Enter key submission
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('fp-email').addEventListener('keydown', e => {
    if (e.key === 'Enter') doForgotPassword();
  });
});
</script>
</body>
</html>
