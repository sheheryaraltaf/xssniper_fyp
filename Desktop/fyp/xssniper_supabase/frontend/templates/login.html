<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XSSniper — Login</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="auth-bg">
  <div class="auth-orb auth-orb-1"></div>
  <div class="auth-orb auth-orb-2"></div>
  <div class="auth-orb auth-orb-3"></div>
  <div style="position:absolute;inset:0;background-image:linear-gradient(var(--b) 1px,transparent 1px),linear-gradient(90deg,var(--b) 1px,transparent 1px);background-size:60px 60px;opacity:0.3;pointer-events:none;"></div>

  <div class="auth-card">
    <div class="auth-icon">🛡️</div>
    <div class="auth-title glitch-text" data-text="XSSNIPER">XSSNIPER</div>
    <div class="auth-subtitle">// SECURE ACCESS PORTAL</div>

    {% if request.query_params.get('error') %}
    <div class="error-msg" style="display:block">⚠ Authentication failed. Please try again.</div>
    {% endif %}

    <!-- ── Social Sign-In ── -->
    <div class="social-btns">

      <!-- Google -->
      <a href="{{ google_url }}" class="btn btn-google" style="width:100%;">
        <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.05-3.71 1.05-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </a>

      <!-- GitHub -->
      <a href="{{ github_url }}" class="btn btn-github" style="width:100%;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
          <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
        </svg>
        Continue with GitHub
      </a>
    </div>

    <div class="divider">OR</div>

    <div id="login-error" class="error-msg"></div>

    <form onsubmit="doLogin(event)">
      <div class="form-group">
        <label class="form-label">Email or Username</label>
        <input id="login-input" class="form-input" type="text" placeholder="you@email.com or username" autocomplete="username" required>
      </div>
      <div class="form-group" style="margin-bottom:20px">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <input id="login-pass" class="form-input" type="password" placeholder="Enter password" autocomplete="current-password" required style="padding-right:40px">
          <span class="input-icon" data-eye="login-pass" onclick="togglePassword('login-pass')">👁</span>
        </div>
      </div>
      <button id="login-btn" type="submit" class="btn btn-primary btn-lg" style="width:100%;font-family:var(--font-hd);letter-spacing:3px;font-size:15px;">
        LOGIN
      </button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:13px;color:var(--td)">
      Don't have an account?
      <a href="/register" style="color:var(--g);text-decoration:none;margin-left:4px;font-weight:600;">Register →</a>
    </p>
    <p style="text-align:center;margin-top:8px;font-family:var(--font-mono);font-size:11px;color:var(--tm);">
      Default: admin / admin
    </p>
  </div>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
